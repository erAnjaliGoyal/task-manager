name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
        
      - name: Install frontend dependencies
        run: npm ci
      
      - name: Build frontend
        run: npm run build

  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Run backend tests
        run: pytest
  
  docker-backend:
    needs: backend
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Login to github container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend Docker image
        run: |
          docker build \
            -t ghcr.io/eranjaligoyal/task-manager-backend:${{ github.sha }} \
            -t ghcr.io/eranjaligoyal/task-manager-backend:latest \
            ./backend
      
      - name: Scan backend Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/eranjaligoyal/task-manager-backend:${{ github.sha }}
          severity: CRITICAL, HIGH
          exit-code: "1"
      
      - name: Audit frontend dependencies
        run: npm audit --audit-level=high

      - name: Install pip-audit
        run: pip install pip-audit
      
      - name: Audit backend dependencies
        run: pip-audit -r requirements.txt

      - name: Push backend Docker image
        run: |
          docker push ghcr.io/eranjaligoyal/task-manager-backend:${{ github.sha }}
          docker push ghcr.io/eranjaligoyal/task-manager-backend:latest

  deploy-backend:
    needs: docker-backend
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render backend deploy
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"


  smoke-test-backend:
    needs: deploy-backend
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Wait for Deployment
        run: sleep 60

      - name: Check backend health
        run: curl --fail https://task-manager-qpec.onrender.com/health
      
      - name: Check backend health
        run: |
          for i in {1..10}; do
            if curl --fail https://task-manager-qpec.onrender.com/health; then
              exit 0
            fi
            echo "Backend not ready yet. Retrying..."
            sleep 15
          done
          exit 1